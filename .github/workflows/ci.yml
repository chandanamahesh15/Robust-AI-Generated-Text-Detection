name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev)
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev tools
        run: pip install -e ".[dev]"
      - name: Ruff (style + unused imports)
        run: ruff check src app tests
      - name: Mypy (type-check the production path)
        run: >
          mypy src/config.py src/data.py src/evaluate.py src/logging_utils.py
          src/features.py src/models/tfidf.py src/pipeline.py app/main.py

  docker:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build serving image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ai-vs-human-detector:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
